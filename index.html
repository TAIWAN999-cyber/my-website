<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0b0b0f;
  color:#fff;
}

/* NAV */
nav{
  position:sticky;
  top:0;
  background:#0b0b0f;
  padding:15px;
  text-align:center;
  border-bottom:1px solid #222;
}

nav a{
  margin:0 12px;
  color:#ccc;
  text-decoration:none;
  font-size:14px;
}

nav a:hover{
  color:#fff;
}

/* CONTAINER */
.container{
  width:90%;
  max-width:1100px;
  margin:auto;
  padding:30px 0;
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 0;
}

.btn{
  display:inline-block;
  margin-top:20px;
  padding:12px 24px;
  border-radius:30px;
  background:linear-gradient(135deg,#5f9cff,#9b5cff);
  color:#fff;
  text-decoration:none;
  font-weight:600;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-top:20px;
}

/* CARD */
.card{
  background:#15151c;
  padding:15px;
  border-radius:15px;
  transition:.3s;
}

.card:hover{
  transform:translateY(-5px);
  background:#1c1c26;
}

.card img{
  width:100%;
  border-radius:10px;
}

/* SECTION */
h2{
  margin-top:50px;
}

/* FLOAT BTN */
.float{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#9b5cff;
  padding:15px 18px;
  border-radius:50px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:40px 0;
  color:#777;
}
</style>
</head>
