/* HERO */
.hero{
  height:100vh;

  display:flex;

  background:linear-gradient(135deg,#ff7a00,#ff2d55);
  color:#fff;

  font-weight:700;
}

/* SECTION */
.section{

  text-align:center;
}

.section.dark{

}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-top:30px;
}

.card{
  background:#1a1a22;
  padding:20px;
  border-radius:15px;
}

/* IMAGE BLOCK */
.image-block{

  background-position:center;
  display:flex;
  align-items:center;
  justify-content:center;
}

.overlay{
  background:rgba(0,0,0,0.5);
  padding:30px;
  border-radius:10px;
}

/* FLOAT BTN */
.float{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ff2d55;
  padding:15px 20px;
  border-radius:50px;
  font-weight:700;
